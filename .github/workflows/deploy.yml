name: Build and Deploy .NET 10 MVC App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          
      - name: Restore Dependencies
        run: dotnet restore

      - name: Publish Application
        run: |
          dotnet publish -c Release -f net10.0 -r win-x64 --self-contained false -o ./publish

      - name: Block protected storage paths from publish artifact
        run: |
          set -e

          PROTECTED_PATHS=(
            "./publish/Archivos"
            "./publish/wwwroot/articles"
          )

          for path in "${PROTECTED_PATHS[@]}"; do
            if [ -e "$path" ]; then
              echo "::error::Protected path exists in publish output: $path"
              echo "Deployment stopped to avoid modifying FTP storage files."
              exit 1
            fi
          done

      - name: Take Application Offline
        run: |
          sudo apt-get update && sudo apt-get install -y lftp
          echo "<h1>Sitio en mantenimiento. Actualizando aplicación...</h1>" > app_offline.htm
          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" ${{ secrets.FTP_SERVER }} -e "
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ssl:verify-certificate no;
            set ftp:passive-mode true;
            put app_offline.htm -o ${{ vars.FTP_DIR }}/app_offline.htm;
            echo "Waiting ${{ vars.WAIT_SECONDS }} seconds for the server to release file locks..."
            sleep ${{ vars.WAIT_SECONDS }}
            quit"

      - name: Sync Files to FTP Server (with TLS)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: ${{ vars.FTP_DIR }}/
          protocol: ftps
          port: 21
          security: loose
          exclude: |
            **/app_offline.htm

            Archivos/**
            Archivos/**/*
            **/Archivos/**
            **/Archivos/**/*

            wwwroot/articles/**
            wwwroot/articles/**/*
            **/wwwroot/articles/**
            **/wwwroot/articles/**/*

      - name: Bring Application Online
        if: always()
        run: |
          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" ${{ secrets.FTP_SERVER }} -e "
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ssl:verify-certificate no;
            set ftp:passive-mode true;
            rm ${{ vars.FTP_DIR }}/app_offline.htm;
            quit"
